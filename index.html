<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="testboostrap/css/login.css">
    <link rel="stylesheet" href="testboostrap/boostrap-custom.css">
    <link rel="stylesheet" href="testboostrap/css/personalisation.css">
</head>

<body>
    <main>
        <img src="images/login.png" alt="">
        <div class="mx-auto">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/digitalsansfrontiere/acceuil.html">
                <img src="images/logo.svg" alt="logo" height="40">
                <h2>DigiSIAD</h2>
            </a>
            <!--Formulaire connexion-->
            <form>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Login</label>
                    <input type="email" class="form-control bg-info" id="exampleInputEmail1"
                        aria-describedby="emailHelp" placeholder="Email">
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control bg-info" id="exampleInputPassword1"
                        placeholder="Password">
                </div>

                <button type="submit" class="btn bg-blue w-100">Connexion</button>
                <p><a href="changermdp.html">Mots de passe oublié</a></p>

                <hr>
            </form>
            <p>Vous n'avez pas de compte ? <a href="inscription.html">Inscrivez vous</a></p>
        </div>
    </main>
</body>

</html>
